name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Build
        run: npm run build
        env:
          NODE_ENV: development

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # Preserve files in other subdirectories (e.g. staging/) so a
          # production deploy doesn't wipe the staging environment.
          keep_files: true
