name: Deploy to Staging

on:
  push:
    branches-ignore: [master]

permissions:
  contents: write

jobs:
  build-and-deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Build
        run: npm run build
        env:
          NODE_ENV: development
          # Build with /staging/ as the base path so all asset URLs resolve
          # correctly when served from lpremuda.github.io/staging/
          VITE_BASE_PATH: /staging/

      - name: Deploy to gh-pages/staging
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # Deploy into the staging/ subdirectory, not the root.
          destination_dir: staging
          # Preserve the root (production) files when deploying staging.
          keep_files: true
